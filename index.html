<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>逃离期末周｜心理班会互动游戏</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <header>
    <h1>逃离期末周</h1>
    <div class="subtitle">心理班会分组决策游戏｜有限体力、有限心态、有限 GPA，但 ddl 无限</div>
  </header>

  <main>
    <section id="setup" class="card">
      <h2>游戏设置</h2>
      <p class="small" id="setupIntro"></p>
      <div class="mode-switch" role="radiogroup" aria-label="游戏模式">
        <button class="mode-option active" type="button" data-mode="competition">竞赛模式</button>
        <button class="mode-option" type="button" data-mode="challenge">闯关模式</button>
      </div>
      <div class="setup-panels">
        <div class="setup-panel active" id="competitionPanel">
          <div class="row setup-row">
            <label for="teamCount">组数：</label>
            <input id="teamCount" type="number" min="2" max="20" value="15" />
            <label>每组初始值：</label>
            <label class="field-compact" for="initialStaminaInput">体力</label>
            <input id="initialStaminaInput" type="number" min="-20" max="30" value="10" />
            <label class="field-compact" for="initialMoodInput">心情</label>
            <input id="initialMoodInput" type="number" min="-20" max="30" value="10" />
            <label class="field-compact" for="initialGpaInput">GPA</label>
            <input id="initialGpaInput" type="number" min="-20" max="30" value="10" />
            <label class="check-field" for="hideScoreHintsInput">
              <input id="hideScoreHintsInput" type="checkbox" />
              隐藏分值提示
            </label>
            <button id="startBtn" type="button">开始游戏</button>
          </div>
        </div>
        <div class="setup-panel" id="challengePanel">
          <div class="row setup-row">
            <label for="difficultySelect">难度：</label>
            <select id="difficultySelect">
              <option value="easy">轻松闯关</option>
              <option value="normal" selected>标准期末</option>
              <option value="hard">高压挑战</option>
            </select>
            <span class="pill" id="difficultyHint"></span>
            <button id="challengeStartBtn" type="button">开始闯关</button>
          </div>
        </div>
      </div>
    </section>

    <section id="game" class="hidden">
      <section class="play-layout">
        <div class="card question-card">
          <div class="question-title" id="questionTitle"></div>
          <div class="question-text" id="questionText"></div>
          <div class="small" id="followTip"></div>
          <div id="options" class="options"></div>
          <div class="countdown-track" id="countdownTrack" aria-hidden="true">
            <div id="countdownBar"></div>
          </div>
          <div class="timer-line">
            <span id="timerLabel">倒计时 00:00</span>
            <button class="secondary" id="pauseBtn" type="button">暂停</button>
          </div>
          <div class="row option-actions">
            <button id="confirmBtn" type="button" disabled>记录本组选择</button>
            <button class="secondary" id="randomBtn" type="button">随机选择</button>
          </div>
        </div>

        <aside class="side-panel">
          <div class="card status-card">
            <div class="statusbar">
              <div>
                <b id="roundInfo">第 1 轮 / 共 6 轮</b>
                <span class="muted" id="turnInfo"></span>
              </div>
              <div class="progress"><div id="progressBar"></div></div>
              <button class="secondary" id="resetBtn" type="button">重新开始</button>
            </div>
          </div>

          <div class="card team-card">
            <h2 id="teamTitle">当前各组状态</h2>
            <div id="teams" class="grid"></div>
          </div>

          <section class="card log-card">
            <h2>游戏记录</h2>
            <div id="log" class="log"></div>
          </section>
        </aside>
      </section>
    </section>

    <section id="result" class="card hidden">
      <h2>最终结果</h2>
      <p class="small" id="scoreRule"></p>
      <div id="resultTable"></div>
      <div class="card reflection">
        <h3>班会收束提示</h3>
        <p id="reflectionText"></p>
      </div>
      <button id="againBtn" type="button">再玩一次</button>
    </section>
  </main>

  <aside id="musicWidget" class="music-widget" aria-label="音乐播放器">
    <button id="musicToggle" class="music-toggle" type="button" aria-expanded="false" aria-controls="musicPanel" title="音乐播放器">
      <span aria-hidden="true">♪</span>
    </button>
    <div id="musicPanel" class="music-panel">
      <div class="music-panel-head">
        <b id="musicProviderLabel">音乐播放器</b>
        <span>页面内持续播放</span>
      </div>
      <p id="musicStatus" class="music-status">播放器加载中...</p>
      <div id="musicFrameSlot" class="music-frame-slot"></div>
    </div>
  </aside>

  <div id="trapModal" class="trap-modal hidden" role="dialog" aria-modal="true" aria-labelledby="trapTitle">
    <div class="trap-dialog">
      <div class="trap-kicker">突发状况</div>
      <h2 id="trapTitle">强制休息触发</h2>
      <div id="trapMessage" class="trap-message"></div>
      <button id="trapCloseBtn" type="button">知道了</button>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
